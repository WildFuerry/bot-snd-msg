name: Discord Notifications

on:
  push:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send commit info to Discord
        if: github.event_name == 'push' && secrets.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_URL: ${{ github.event.head_commit && github.event.head_commit.url || '' }}
          COMMIT_MSG: ${{ github.event.head_commit && github.event.head_commit.message || '' }}
          AUTHOR_NAME: ${{ github.event.head_commit && github.event.head_commit.author && github.event.head_commit.author.name || '' }}
          ACTOR: ${{ github.actor }}
        run: |
          python3 <<'PY' | curl -fsS -X POST -H "Content-Type: application/json" --data-binary @- "$DISCORD_WEBHOOK"
          import json, os

          def trunc(s: str, limit: int = 1800) -> str:
              s = s or ""
              return s if len(s) <= limit else s[: limit - 3] + "..."

          msg = os.environ.get("COMMIT_MSG") or ""
          sha = os.environ.get("GITHUB_SHA") or ""
          if not msg.strip() and sha:
              msg = f"(нет текста коммита в payload; SHA {sha[:7]})"
          author = os.environ.get("AUTHOR_NAME") or os.environ.get("ACTOR") or "unknown"
          url = os.environ.get("COMMIT_URL") or ""

          content = (
              f"📦 **Репозиторий:** {os.environ['REPO']}\n"
              f"🌿 **Ветка:** {os.environ['REF_NAME']}\n"
              f"💬 **Коммит:** {trunc(msg)}\n"
              f"👤 **Автор:** {author}\n"
              f"🔗 {url}"
          )
          print(json.dumps({"content": content}, ensure_ascii=False))
          PY

      - name: Send release info to Discord
        if: github.event_name == 'release' && secrets.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          python3 <<'PY' | curl -fsS -X POST -H "Content-Type: application/json" --data-binary @- "$DISCORD_WEBHOOK"
          import json, os

          title = os.environ.get("RELEASE_NAME") or ""
          tag = os.environ.get("TAG") or ""

          content = (
              f"🚀 **Новый релиз!**\n"
              f"📦 **Репозиторий:** {os.environ['REPO']}\n"
              f"🏷 **Версия:** {tag}\n"
              f"📝 **Название:** {title}\n"
              f"🔗 {os.environ.get('RELEASE_URL', '')}"
          )
          print(json.dumps({"content": content}, ensure_ascii=False))
          PY
